version: "3.9"

# ── Observability stack ──────────────────────────────────────────────
# Stand up locally for Grafana dashboards:
#   docker compose -f docker-compose.observability.yml up -d
#
# Then generate traffic:
#   python -c "
#   import requests, time, random
#   genres = ['Drama','Action','Comedy']
#   cast = [['Shah Rukh Khan'],['Salman Khan'],['Akshay Kumar']]
#   for i in range(200):
#       requests.post('http://localhost:8000/predict-rating',
#           headers={'X-API-Key': 'dev-key-12345'},
#           json={'title': f'Test {i}', 'genres': [random.choice(genres)], 'cast': random.choice(cast), 'budget_inr': 5e7})
#       if i % 50 == 0: print(f'{i}/200 done')
#   print('Done')
#   "
#
# Grafana: http://localhost:3000 (admin/admin)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tamasha-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tamasha-obs

  grafana:
    image: grafana/grafana:10.4.0
    container_name: tamasha-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/tamasha-overview.json
    volumes:
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prometheus
    networks:
      - tamasha-obs

networks:
  tamasha-obs:
    driver: bridge
